apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-auth 
  namespace: kube-system
data:
  mapUsers: |
    - userarn: arn:aws:iam::127486921697:user/Dora    # Update as needed with your IAM user ARN
      username: Dora    # Update as needed with your desired Kubernetes username
      groups:
        - system:masters    # Gives admin access to cluster