# ============================================================
# GitHub Actions CI/CD Pipeline: Deploy Nest App to AWS ECS
# ============================================================
# This workflow automates:
#   1. Provisioning AWS infrastructure with Terraform
#   2. Building, scanning, and pushing a Docker image to ECR
#   3. Creating a new ECS task definition revision
#   4. Restarting the ECS Fargate service
#   5. Testing application health
#   6. Monitoring the deployment
#   7. Rolling back on failure
#   8. Sending Slack notifications
# ============================================================

name: Deploy Nest App to AWS ECS

# --------------------------------------------------------------
# TRIGGER: When should this workflow run?
#
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/nest-app.yml"
      - "docker/nest-app/**"
      - "terraform-module-pro7/nest-app/**"
  workflow_dispatch:
# --------------------------------------------------------------
# ENVIRONMENT VARIABLES: Shared across all jobs
# --------------------------------------------------------------  

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: "127486921697"
  PROJECT_NAME: nest
  ENVIRONMENT: dev
  IMAGE_NAME: nest
  IMAGE_TAG: latest
  TERRAFORM_ACTION: apply

jobs:

  #--------------------------------------------------------------
  # JOB 1: Build AWS Infrastructure
  #--------------------------------------------------------------
  deploy:
    name: Deploy Nest App to AWS ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure SSH access for Terraform modules
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform init
        working-directory: ./terraform-module-pro7/nest-app
        run: terraform init

      - name: Terraform plan
        working-directory: ./terraform-module-pro7/nest-app
        run: terraform plan

      - name: Terraform apply
        if: env.TERRAFORM_ACTION == 'apply'
        working-directory: ./terraform-module-pro7/nest-app
        run: terraform apply -auto-approve

      - name: Export Terraform outputs
        working-directory: ./terraform-module-pro7/nest-app
        run: |
          echo "DOMAIN_NAME=$(terraform output -raw domain_name | cut -d ':' -f1)" >> $GITHUB_ENV
          echo "ECS_CLUSTER_NAME=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_ENV
          echo "ECS_SERVICE_NAME=$(terraform output -raw ecs_service_name)" >> $GITHUB_ENV
          echo "ECS_TASK_DEFINITION_NAME=$(terraform output -raw ecs_task_definition_name)" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build \
          --build-arg AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
          --build-arg AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
          --build-arg AWS_REGION=eu-west-2 \
          --build-arg S3_BUCKET=dev-app-dora-webfiles \
          --build-arg S3_PREFIX=Project-2-assets \
          --build-arg APPLICATION_CODE_FILE_NAME=nest \
          --build-arg SERVICE_PROVIDER_FILE_NAME=AppServiceProvider \
          --build-arg RDS_DB_PASSWORD=${{ secrets.RDS_DB_PASSWORD }} \
          -t $IMAGE_NAME:$IMAGE_TAG \
          -f docker/nest-app/Dockerfile \
            docker/nest-app  
            

      - name: Tag Docker image
        run: |
          docker tag $IMAGE_NAME:$IMAGE_TAG \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME:$IMAGE_TAG

      - name: Push Docker image to ECR
        run: |
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME:$IMAGE_TAG

      - name: Force ECS new deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER_NAME \
            --service $ECS_SERVICE_NAME \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for ECS service to become stable
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER_NAME \
            --services $ECS_SERVICE_NAME \
            --region $AWS_REGION

      - name: Test application health
        run: |
          curl -I https://www.dorasws.org || true

    outputs:
      terraform_action: ${{ env.TERRAFORM_ACTION }}
      domain_name: ${{ env.DOMAIN_NAME }}
      rds_endpoint: ${{ env.RDS_ENDPOINT }}
      task_definition_name: ${{ env.ECS_TASK_DEFINITION_NAME }}
      ecs_cluster_name: ${{ env.ECS_CLUSTER_NAME }}
      ecs_service_name: ${{ env.ECS_SERVICE_NAME }}